# Open5GS core for the 4-DU/4-CU topology (project ccd5g). Combined with the
# generated compose-ran.yml (4 CU + 4 DU + 4 UE) on the same 'ran' network:
#   python ../scripts/generate_compose.py         # writes compose-ran.yml + gen/
#   python ../scripts/testbed.py up               # -f compose-core.yml -f compose-ran.yml
# The core is identical to compose-smoke.yml minus the gNB/UE (which the RAN file adds)
# and seeds four subscribers (one per UE).

name: ccd5g

networks:
  ran:
    ipam:
      config:
        - subnet: 10.53.1.0/24

x-open5gs: &open5gs
  image: gradiant/open5gs:2.7.0
  restart: unless-stopped
  networks:
    ran:

services:
  mongo:
    image: mongo:6.0
    container_name: ccd5g-mongo
    restart: unless-stopped
    networks:
      ran:
        ipv4_address: 10.53.1.100
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping: 1})"]
      interval: 5s
      timeout: 5s
      retries: 12

  mongo-init:
    image: mongo:6.0
    container_name: ccd5g-mongo-init
    networks:
      ran:
        ipv4_address: 10.53.1.99
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./open5gs/add_subscribers.js:/add_subscribers.js:ro
    entrypoint: ["mongosh", "--host", "mongo", "--file", "/add_subscribers.js"]
    restart: "no"

  nrf:
    <<: *open5gs
    container_name: ccd5g-nrf
    command: open5gs-nrfd
    networks:
      ran:
        ipv4_address: 10.53.1.101
    volumes:
      - ./open5gs/config/nrf.yaml:/opt/open5gs/etc/open5gs/nrf.yaml:ro

  scp:
    <<: *open5gs
    container_name: ccd5g-scp
    command: open5gs-scpd
    networks:
      ran:
        ipv4_address: 10.53.1.102
    depends_on: [nrf]
    volumes:
      - ./open5gs/config/scp.yaml:/opt/open5gs/etc/open5gs/scp.yaml:ro

  ausf:
    <<: *open5gs
    container_name: ccd5g-ausf
    command: open5gs-ausfd
    networks:
      ran:
        ipv4_address: 10.53.1.103
    depends_on: [scp]
    volumes:
      - ./open5gs/config/ausf.yaml:/opt/open5gs/etc/open5gs/ausf.yaml:ro

  udm:
    <<: *open5gs
    container_name: ccd5g-udm
    command: open5gs-udmd
    networks:
      ran:
        ipv4_address: 10.53.1.104
    depends_on: [scp]
    volumes:
      - ./open5gs/config/udm.yaml:/opt/open5gs/etc/open5gs/udm.yaml:ro

  udr:
    <<: *open5gs
    container_name: ccd5g-udr
    command: open5gs-udrd
    networks:
      ran:
        ipv4_address: 10.53.1.105
    depends_on:
      scp:
        condition: service_started
      mongo:
        condition: service_healthy
    volumes:
      - ./open5gs/config/udr.yaml:/opt/open5gs/etc/open5gs/udr.yaml:ro

  pcf:
    <<: *open5gs
    container_name: ccd5g-pcf
    command: open5gs-pcfd
    networks:
      ran:
        ipv4_address: 10.53.1.106
    depends_on:
      scp:
        condition: service_started
      mongo:
        condition: service_healthy
    volumes:
      - ./open5gs/config/pcf.yaml:/opt/open5gs/etc/open5gs/pcf.yaml:ro

  bsf:
    <<: *open5gs
    container_name: ccd5g-bsf
    command: open5gs-bsfd
    networks:
      ran:
        ipv4_address: 10.53.1.107
    depends_on: [scp]
    volumes:
      - ./open5gs/config/bsf.yaml:/opt/open5gs/etc/open5gs/bsf.yaml:ro

  nssf:
    <<: *open5gs
    container_name: ccd5g-nssf
    command: open5gs-nssfd
    networks:
      ran:
        ipv4_address: 10.53.1.108
    depends_on: [scp]
    volumes:
      - ./open5gs/config/nssf.yaml:/opt/open5gs/etc/open5gs/nssf.yaml:ro

  smf:
    <<: *open5gs
    container_name: ccd5g-smf
    command: open5gs-smfd
    depends_on: [scp, upf]
    networks:
      ran:
        ipv4_address: 10.53.1.109
    volumes:
      - ./open5gs/config/smf.yaml:/opt/open5gs/etc/open5gs/smf.yaml:ro

  upf:
    <<: *open5gs
    container_name: ccd5g-upf
    command: open5gs-upfd
    privileged: true
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun
    networks:
      ran:
        ipv4_address: 10.53.1.3
    volumes:
      - ./open5gs/config/upf.yaml:/opt/open5gs/etc/open5gs/upf.yaml:ro

  amf:
    <<: *open5gs
    container_name: ccd5g-amf
    command: open5gs-amfd
    depends_on: [scp, ausf, udm, udr, pcf, nssf]
    networks:
      ran:
        ipv4_address: 10.53.1.2
    volumes:
      - ./open5gs/config/amf.yaml:/opt/open5gs/etc/open5gs/amf.yaml:ro
