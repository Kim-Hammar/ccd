# Minimal srsRAN Project gNB config for the 1-gNB ZMQ smoke bring-up.
# Follows the official "srsUE with srsRAN Project gNB over ZMQ" tutorial settings:
# band n3, 20 MHz (106 PRB), 15 kHz SCS, base_srate 23.04e6, and the pdcch/prach
# settings srsUE requires (coreset0 12, ss0 0, common ss2, no DCI 0_1/1_1).
# PLMN 00101 / TAC 7 matches the Open5GS core config.
cu_cp:
  amf:
    addr: 10.53.1.2            # Open5GS AMF (NGAP)
    bind_addr: 10.53.1.10      # gNB address on the core network
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1

ru_sdr:
  device_driver: zmq
  device_args: tx_port=tcp://10.53.1.10:2000,rx_port=tcp://10.53.1.20:2001,base_srate=23.04e6
  srate: 23.04
  tx_gain: 75
  rx_gain: 75

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 7
  pci: 1
  pdcch:
    common:
      ss0_index: 0
      coreset0_index: 12
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
  pdsch:
    mcs_table: qam64          # 256QAM is invalid with the fallback DCI of a common SS#2
  pusch:
    mcs_table: qam64
  prach:
    prach_config_index: 1

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  ngap_enable: false
