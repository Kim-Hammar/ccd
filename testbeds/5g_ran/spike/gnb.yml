# Minimal srsRAN Project gNB config for the ZMQ sync spike (monolithic gNB, band n3, 5 MHz).
cu_cp:
  amf:
    addr: 10.53.1.2            # Open5GS AMF (NGAP)
    bind_addr: 10.53.1.10      # gNB address on the core network
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1

ru_sdr:
  device_driver: zmq
  device_args: tx_port=tcp://10.53.1.10:2000,rx_port=tcp://10.53.1.20:2001,base_srate=11.52e6
  srate: 11.52
  tx_gain: 75
  rx_gain: 75

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 10
  common_scs: 15
  plmn: "00101"
  tac: 7
  pci: 1

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  ngap_enable: false
